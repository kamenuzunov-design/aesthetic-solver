<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Aesthetic Solver</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:,">
</head>
<body>
    <header>
        <h1 id="ui-title">Aesthetic Solver</h1>
        <div class="controls">
            <button onclick="setLanguage('bg')">БГ</button>
            <button onclick="setLanguage('en')">EN</button>
        </div>
    </header>

    <main style="display: flex; flex-direction: column; padding: 20px; gap: 20px;">
        <div class="input-panel" style="background: #eee; padding: 15px; border-radius: 8px;">
            <label id="ui-base-num">Nom:</label>
            <input type="number" id="baseNum" value="200" style="width: 80px;">
            
            <label>Система:</label>
            <select id="ratioSelect">
                <option value="rpch2">II РПЧ (1.059)</option>
                <option value="rpch3">III РПЧ (1.122)</option>
                <option value="rpch4">IV РПЧ (1.259)</option>
                <option value="rzs">РЗС (1.272)</option>
                <option value="rzv">РЗВ (1.309)</option>
                <option value="zs" selected>ЗС (1.618)</option>
            </select>
            
            <button id="ui-calculate" onclick="calculate()">Анализ</button>
        </div>
        
        <div id="workspace" style="display: flex; gap: 20px;">
            <canvas id="mainCanvas" style="border:2px solid #2c3e50; cursor: crosshair;"></canvas>
                <div id="results-area" style="flex: 1; overflow-x: auto; background: white; border: 1px solid #ccc; max-height: 80vh;">
                    <table id="propsTable" style="width: 100%; border-collapse: collapse; font-family: monospace; font-size: 13px; text-align: center;">
                        </table>
                </div>
        </div>
    </main>

    <script src="lang.js"></script>
    <script src="solver.js"></script>
</body>
</html>
