<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Aesthetic Solver</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="apple-touch-icon" href="images/favicon.png">
</head>
<body>
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background-color: #2d3d4c; border-bottom: 3px solid #1a252f;">
        <div onclick="navigateTo('numeric')" style="display: flex; flex-direction: column; align-items: flex-start; cursor: pointer;" title="Към Числово пропорциониране">
            <img src="images/logo.png" alt="Logo" style="width: 243px; height: 100px; margin-bottom: 5px;">
            <h2 id="ui-title" style="margin: 0; font-family: Arial, sans-serif; color: #ffffff; letter-spacing: 1px;">Aesthetic Solver</h2>
        </div>

        <div class="controls" style="display: flex; gap: 25px;">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                <img src="images/bg_flag.png" alt="BG" 
                     style="width: 45px; height: 45px; cursor: pointer; border: 2px solid #ffffff; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2);" 
                     onclick="setLanguage('bg')">
                <button onclick="setLanguage('bg')" style="cursor: pointer; background: rgba(255,255,255,0.1); border: 1px solid #ffffff; border-radius: 4px; padding: 2px 10px; font-size: 12px; color: #ffffff;">БГ</button>
            </div>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                <img src="images/eng_flag.png" alt="EN" 
                     style="width: 45px; height: 45px; cursor: pointer; border: 2px solid #ffffff; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2);" 
                     onclick="setLanguage('en')">
                <button onclick="setLanguage('en')" style="cursor: pointer; background: rgba(255,255,255,0.1); border: 1px solid #ffffff; border-radius: 4px; padding: 2px 10px; font-size: 12px; color: #ffffff;">EN</button>
            </div>
        </div>
    </header>

    <nav style="background-color: #3e4f5f; padding: 0 30px; display: flex; gap: 10px;">
        <button id="ui-tab-num" onclick="navigateTo('numeric')" style="background: none; border: none; color: white; padding: 15px; cursor: pointer; font-weight: bold; font-family: Arial;">Числово ПРОПОРЦИОНИРАНЕ</button>
        <button id="ui-tab-graph" onclick="navigateTo('geometric')" style="background: none; border: none; color: white; padding: 15px; cursor: pointer; font-weight: bold; font-family: Arial;">Геометрично ПРОПОРЦИОНИРАНЕ</button>
        <button id="ui-tab-about" onclick="navigateTo('about')" style="background: none; border: none; color: white; padding: 15px; cursor: pointer; font-weight: bold; font-family: Arial;">За ПРИЛОЖЕНИЕТО</button>
        <button id="ui-tab-help" onclick="navigateTo('help')" style="background: none; border: none; color: white; padding: 15px; cursor: pointer; font-weight: bold; font-family: Arial;">ПОМОЩ</button>
    </nav>

    <main style="padding: 20px;">
		<section id="sec-numeric" class="app-section">
			<div style="display: flex; gap: 20px; align-items: flex-start;">
				
				<div style="flex: 1; background: #eee; padding: 15px; border-radius: 8px; border: 1px solid #ccc;">
					<h3 id="ui-direct-title" style="margin-top: 0; color: #2d3d4c; border-bottom: 1px solid #ccc; padding-bottom: 5px;">Право пропорциониране</h3>
					
					<div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 10px;">
						<label id="ui-label-nom">Nom:</label>
						<input type="number" id="baseNum" value="200" style="width: 70px; padding: 4px;" onchange="calculate()">
						
						<button id="ui-calculate" onclick="calculate()" style="padding: 5px 12px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 4px; font-weight: bold;">Анализ</button>
						
						<label id="ui-label-system">Система:</label>
						<select id="ratioSelect" onchange="calculate()" style="padding: 4px;">
							<option id="opt-rpch2" value="rpch2">II РПЧ (1.059)</option>
							<option id="opt-rpch3" value="rpch3" selected>III РПЧ (1.122)</option>
							<option id="opt-rpch4" value="rpch4">IV РПЧ (1.259)</option>
							<option id="opt-rzs" value="rzs">РЗС (1.272)</option>
							<option id="opt-rzv" value="rzv">РЗВ (1.309)</option>
							<option id="opt-zs" value="zs">ЗС (1.618)</option>
						</select>

						<button id="ui-recommend" onclick="runRecommendedAnalysis()" style="padding: 5px 12px; cursor: pointer; background-color: #3e4f5f; color: white; border: none; border-radius: 4px;">Препоръчани числа</button>
					</div>
					<div style="margin-top: 15px; display: flex; flex-direction: column; gap: 8px;">
						<label id="ui-label-result-chain" style="font-weight: bold; font-size: 13px;">Препоръчана верига:</label>
						<div style="display: flex; gap: 10px;">
							<input type="text" id="resultChain" readonly 
								   style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; background: #fff; font-family: monospace;" 
								   placeholder="Числата ще се появят тук...">
							<button id="ui-copy-share" onclick="copyAndShare()" 
									style="padding: 8px 15px; cursor: pointer; background-color: #2d3d4c; color: white; border: none; border-radius: 4px;">
									Копирай
							</button>
						</div>
					</div>
				</div>

				<div style="flex: 1; background: #e8e8e8; padding: 15px; border-radius: 8px; border: 1px solid #ccc; min-height: 100px;">
					<h3 id="ui-inverse-title" style="margin-top: 0; color: #2d3d4c; border-bottom: 1px solid #ccc; padding-bottom: 5px;">Обратно пропорциониране</h3>
					<div id="inverse-content" style="margin-top: 10px; display: flex; flex-direction: column; gap: 12px;">
						<label id="ui-label-input-chain" style="font-weight: bold; font-size: 13px;">Въведете числа (разделени със запетая):</label>
						<textarea id="inputChain" rows="3" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; resize: vertical;" placeholder="напр. 100, 112, 126, 141, 158, 178"></textarea>
						
						<button id="ui-inverse-analyze" onclick="runInverseAnalysis()" style="padding: 12px; cursor: pointer; background-color: #2d3d4c; color: white; border: none; border-radius: 4px; font-weight: bold; transition: background 0.3s;">
							Анализ на верига
						</button>

						<div id="inverse-results" style="display: none; background: #fdfdfd; padding: 15px; border-left: 4px solid #2d3d4c; font-size: 13px; line-height: 1.6; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
							<p style="margin: 5px 0;"><strong>Система:</strong> <span id="res-system" style="color: #2c3e50; font-weight: bold;">-</span></p>
							<p style="margin: 5px 0;"><strong>Автоматичен Номинал:</strong> <span id="res-nominal" style="color: #2c3e50; font-weight: bold;">-</span></p>
							<hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
							<p style="color: #d9534f; margin: 5px 0;"><strong>Премахнати (грешни):</strong> <br><span id="res-removed">-</span></p>
							<p style="color: #28a745; margin: 5px 0;"><strong>Хармонична верига (+-2%):</strong> <br><span id="res-exact" style="word-break: break-all;">-</span></p>
						</div>
					</div>
				</div>

			</div>

			<div id="results-area" style="overflow-x: auto; background: white; border: 1px solid #ccc; margin-top: 20px;">
				<table id="propsTable" style="width: 100%; border-collapse: collapse; text-align: center;"></table>
			</div>
		</section>

        <section id="sec-geometric" class="app-section" style="display: none;">
            <div style="background: #eee; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                <h3 id="ui-geo-title">Геометрично пропорциониране (Canvas)</h3>
            </div>
            <canvas id="mainCanvas" style="border:2px solid #2d3d4c; background: white; display: block; margin: 0 auto;"></canvas>
        </section>

		<section id="sec-about" class="app-section" style="display: none;">
			<div style="background: white; padding: 40px; border-radius: 12px; border: 1px solid #ddd; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 900px; margin: 0 auto; line-height: 1.6;">
				
				<div style="text-align: center; margin-bottom: 30px;">
					<h2 id="ui-about-title" style="color: #2d3d4c; font-size: 28px; border-bottom: 2px solid #2d3d4c; display: inline-block; padding-bottom: 10px;"></h2>
				</div>

				<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 20px;">
					<div>
						<h3 id="ui-about-mission-title" style="color: #3e4f5f;"></h3>
						<p id="ui-about-mission"></p>
					</div>
					<div>
						<h3 id="ui-about-method-title" style="color: #3e4f5f;"></h3>
						<p id="ui-about-method"></p>
					</div>
				</div>

				<hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

				<div style="background: #f8f9fa; padding: 20px; border-radius: 8px;">
					<h3 id="ui-about-features-title" style="color: #3e4f5f; margin-top: 0;"></h3>
					<ul style="padding-left: 20px;">
						<li id="ui-about-feat-1"></li>
						<li id="ui-about-feat-2"></li>
						<li id="ui-about-feat-3"></li>
					</ul>
				</div>

				<div style="margin-top: 30px; text-align: right; font-style: italic; color: #777;">
					<p id="ui-about-version"></p>
				</div>
			</div>
		</section>

        <section id="sec-help" class="app-section" style="display: none;">
            <div style="background: white; padding: 30px; border-radius: 8px; border: 1px solid #ccc;">
                <h2 id="ui-help-title"></h2>
                <p id="ui-help-text" style="margin-bottom: 20px; font-weight: bold;"></p>
                <ul style="line-height: 1.8;">
                    <li id="ui-help-step-1"></li>
                    <li id="ui-help-step-2"></li>
                    <li id="ui-help-step-3"></li>
                    <li id="ui-help-step-4"></li>
                </ul>
            </div>
        </section>
    </main>

    <script src="lang.js"></script>
    <script src="solver.js"></script>
    <script>
        function navigateTo(sectionId) {
            document.querySelectorAll('.app-section').forEach(sec => {
                sec.style.display = 'none';
            });
            const target = document.getElementById('sec-' + sectionId);
            if (target) target.style.display = 'block';
            
            if(sectionId === 'geometric' && typeof CanvasManager !== 'undefined') {
                CanvasManager.init();
            }
        }
    </script>
</body>
</html>
