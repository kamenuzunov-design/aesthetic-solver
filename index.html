<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Aesthetic Solver</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1 id="ui-title">Aesthetic Solver</h1>
        <div class="controls">
            <button onclick="setLanguage('bg')">БГ</button>
            <button onclick="setLanguage('en')">EN</button>
        </div>
    </header>

    <main>
        <div class="input-panel">
            <label id="ui-base-num">Основно число (Nom):</label>
            <input type="number" id="baseNum" value="200">
            <button id="ui-calculate" onclick="calculate()">Анализ</button>
        </div>
        
        <div id="results-area">
            <table id="propsTable">
                <thead>
                    <tr id="ui-table-head">
                        <th>Система</th>
                        <th>Стойност</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>

    <script src="lang.js"></script>
    <script src="solver.js"></script>
</body>
</html>
