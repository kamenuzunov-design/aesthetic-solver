<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Aesthetic Solver</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:,">
</head>
<body>
    <header>
    <h2 id="ui-title">Aesthetic Solver</h2>
    <div class="controls">
        <button onclick="setLanguage('bg')">БГ</button>
        <button onclick="setLanguage('en')">EN</button>
    </div>
</header>

<main style="display: flex; flex-direction: column; padding: 20px; gap: 20px;">
    <div class="input-panel" style="background: #eee; padding: 15px; border-radius: 8px;">
        <label id="ui-label-nom">Nom:</label>
        <input type="number" id="baseNum" value="200" style="width: 80px;">
        
        <label id="ui-label-system">Система:</label>
        <select id="ratioSelect">
            <option id="opt-rpch2" value="rpch2">II РПЧ (1.059)</option>
            <option id="opt-rpch3" value="rpch3" selected>III РПЧ (1.122)</option>
            <option id="opt-rpch4" value="rpch4">IV РПЧ (1.259)</option>
            <option id="opt-rzs" value="rzs">РЗС (1.272)</option>
            <option id="opt-rzv" value="rzv">РЗВ (1.309)</option>
            <option id="opt-zs" value="zs">ЗС (1.618)</option>
        </select>
        
        <button id="ui-calculate" onclick="calculate()">Анализ</button>
    </div>
    </main>

    <script src="lang.js"></script>
    <script src="solver.js"></script>
</body>
</html>
