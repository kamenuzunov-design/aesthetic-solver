<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Aesthetic Solver</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="apple-touch-icon" href="images/favicon.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
	<div id="ui-connect-dialog" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(2px);">
		<div style="background: white; padding: 25px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; max-width: 400px; border: 1px solid #ccc;">
			<p style="margin-top:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 18px; color: #333; font-weight: 500;">Искате ли да свържете двете полилинии?</p>
			<div style="margin-top: 25px; display: flex; justify-content: center; gap: 20px;">
				<button id="ui-btn-yes" style="padding: 10px 30px; cursor: pointer; background: #0078d7; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; min-width: 100px; transition: background 0.2s;">Да</button>
				<button id="ui-btn-no" style="padding: 10px 30px; cursor: pointer; background: #e0e0e0; color: #333; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; font-weight: bold; min-width: 100px; transition: background 0.2s;">Не</button>
			</div>
		</div>
	</div>
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; background-color: #2d3d4c; border-bottom: 3px solid #1a252f;">
        <div onclick="navigateTo('numeric')" style="display: flex; flex-direction: column; align-items: flex-start; cursor: pointer;" title="Към Числово пропорциониране">
            <img src="images/logo.png" alt="Logo" style="width: 243px; height: 100px; margin-bottom: 5px;">
            <h2 id="ui-title" style="margin: 0; font-family: Arial, sans-serif; color: #ffffff; letter-spacing: 1px;">Aesthetic Solver</h2>
        </div>

        <div class="controls" style="display: flex; gap: 25px;">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                <img src="images/bg_flag.png" alt="BG" 
                     style="width: 45px; height: 45px; cursor: pointer; border: 2px solid #ffffff; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2);" 
                     onclick="setLanguage('bg')">
                <button onclick="setLanguage('bg')" style="cursor: pointer; background: rgba(255,255,255,0.1); border: 1px solid #ffffff; border-radius: 4px; padding: 2px 10px; font-size: 12px; color: #ffffff;">БГ</button>
            </div>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                <img src="images/eng_flag.png" alt="EN" 
                     style="width: 45px; height: 45px; cursor: pointer; border: 2px solid #ffffff; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2);" 
                     onclick="setLanguage('en')">
                <button onclick="setLanguage('en')" style="cursor: pointer; background: rgba(255,255,255,0.1); border: 1px solid #ffffff; border-radius: 4px; padding: 2px 10px; font-size: 12px; color: #ffffff;">EN</button>
            </div>
        </div>
    </header>

    <nav style="background-color: #3e4f5f; padding: 0 30px; display: flex; gap: 10px;">
        <button id="ui-tab-num" onclick="navigateTo('numeric')" style="background: none; border: none; color: white; padding: 15px; cursor: pointer; font-weight: bold; font-family: Arial;">Числово ПРОПОРЦИОНИРАНЕ</button>
        <button id="ui-tab-graph" onclick="navigateTo('geometric')" style="background: none; border: none; color: white; padding: 15px; cursor: pointer; font-weight: bold; font-family: Arial;">Геометрично ПРОПОРЦИОНИРАНЕ</button>
        <button id="ui-tab-about" onclick="navigateTo('about')" style="background: none; border: none; color: white; padding: 15px; cursor: pointer; font-weight: bold; font-family: Arial;">За ПРИЛОЖЕНИЕТО</button>
        <button id="ui-tab-help" onclick="navigateTo('help')" style="background: none; border: none; color: white; padding: 15px; cursor: pointer; font-weight: bold; font-family: Arial;">ПОМОЩ</button>
    </nav>

    <main style="padding: 20px;">
		<section id="sec-numeric" class="app-section">
			<div style="display: flex; gap: 20px; align-items: flex-start;">
				
				<div style="flex: 1; background: #eee; padding: 15px; border-radius: 8px; border: 1px solid #ccc;">
					<h3 id="ui-direct-title" style="margin-top: 0; color: #2d3d4c; border-bottom: 1px solid #ccc; padding-bottom: 5px;">Права задача</h3>
					
					<div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 10px;">
						<label id="ui-label-nom">Nom:</label>
						<input type="number" id="baseNum" value="200" style="width: 70px; padding: 4px;" onchange="calculate()">
						
						<button id="ui-calculate" onclick="calculate()" style="padding: 5px 12px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 4px; font-weight: bold;">Анализ</button>
						
						<label id="ui-label-system">Система:</label>
						<select id="ratioSelect" onchange="calculate()" style="padding: 4px;">
							<option id="opt-fsz2" value="fsz2">II ФСЗ(1.028)</option>
							<option id="opt-rpch1" value="rpch1">I РПЧ(1.030)</option>
							<option id="opt-rpch2" value="rpch2">II РПЧ(1.059)</option>
							<option id="opt-fsz1" value="fsz1">I ФЗС(1.118)</option>
							<option id="opt-rpch3" value="rpch3" selected>III РПЧ(1.122)</option>
							<option id="opt-rpch4" value="rpch4">IV РПЧ(1.259)</option>
							<option id="opt-rzs" value="rzs">РЗС(1.272)</option>
							<option id="opt-rzv" value="rzv">РЗВ(1.309)</option>
							<option id="opt-zs" value="zs">ЗС (1.618)</option>
						</select>

						<button id="ui-recommend" onclick="runRecommendedAnalysis()" style="padding: 5px 12px; cursor: pointer; background-color: #3e4f5f; color: white; border: none; border-radius: 4px;">Препоръчани числа</button>
					</div>
					<div style="margin-top: 15px; display: flex; flex-direction: column; gap: 8px;">
						<label id="ui-label-result-chain" style="font-weight: bold; font-size: 13px;">Препоръчана верига:</label>
						<div style="display: flex; gap: 10px;">
							<input type="text" id="resultChain" readonly 
								   style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; background: #fff; font-family: monospace;" 
								   placeholder="The numbers will appear here...">
							<button id="ui-copy-share" onclick="copyAndShare()" 
								style="padding: 8px 15px; cursor: pointer; background-color: #2d3d4c; color: white; border: none; border-radius: 4px;">
								Копирай
							</button>
						</div>
					</div>
				</div>

				<div style="flex: 1; background: #e8e8e8; padding: 15px; border-radius: 8px; border: 1px solid #ccc; min-height: 100px;">
					<h3 id="ui-inverse-title" style="margin-top: 0; color: #2d3d4c; border-bottom: 1px solid #ccc; padding-bottom: 5px;">Обратно пропорциониране</h3>
					<div id="inverse-content" style="margin-top: 10px; display: flex; flex-direction: column; gap: 12px;">
						<label id="ui-label-input-chain" style="font-weight: bold; font-size: 13px;">Въведете числа (разделени със запетая):</label>
						<textarea id="inputChain" rows="3" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; resize: vertical;" placeholder="For example: 100, 112, 126, 141, 158, 178"></textarea>
						
						<button id="ui-inverse-analyze" onclick="runInverseAnalysis()" style="padding: 12px; cursor: pointer; background-color: #2d3d4c; color: white; border: none; border-radius: 4px; font-weight: bold; transition: background 0.3s;">
							Анализ на верига
						</button>

					<div id="inverse-results" style="display: none; background: #fdfdfd; padding: 15px; border-left: 4px solid #2d3d4c; font-size: 13px; line-height: 1.6; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
						<p style="margin: 5px 0;"><strong id="ui-res-label-system">Система:</strong> <span id="res-system" style="color: #2c3e50; font-weight: bold;">-</span></p>
						<p style="margin: 5px 0;"><strong id="ui-res-label-nom">Автоматичен Номинал:</strong> <span id="res-nominal" style="color: #2c3e50; font-weight: bold;">-</span></p>
						<hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
						<p style="color: #d9534f; margin: 5px 0;"><strong id="ui-res-label-removed">Премахнати (грешни):</strong> <br><span id="res-removed">-</span></p>
						<p style="color: #28a745; margin: 5px 0;"><strong id="ui-res-label-exact">Хармонична верига (+-2%):</strong> <br><span id="res-exact" style="word-break: break-all;">-</span></p>
					</div>
					</div>
				</div>

			</div>

			<div id="results-area" style="overflow-x: auto; background: white; border: 1px solid #ccc; margin-top: 20px;">
				<table id="propsTable" style="width: 100%; border-collapse: collapse; text-align: center;"></table>
			</div>
		</section>

		<section id="sec-geometric" class="app-section" style="display: none; position: relative;">
			<!-- ХОРИЗОНТАЛЕН TOOLBAR НАД CANVAS-А -->
			<div class="geo-toolbar">
				<!-- Група: Файл -->
				<label for="imgUpload" class="geo-toolbar-btn" title="Качи изображение">
					<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
					</svg>
				</label>
				<input type="file" id="imgUpload" accept="image/*" style="display: none;">

				<!-- Прозрачност -->
				<div class="geo-toolbar-opacity" title="Прозрачност на оригинала">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20Z" fill="currentColor"/>
					</svg>
					<input type="range" id="imgOpacity" min="0" max="1" step="0.1" value="0.5">
				</div>

				<button id="ui-geo-zoom-reset" class="geo-toolbar-btn" title="Нулиране на мащаба">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
					</svg>
				</button>

				<div class="geo-toolbar-sep"></div>

				<!-- Група: Инструменти -->
				<button id="ui-geo-select" class="geo-toolbar-btn" onclick="setTool('select')" title="Селекция">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/>
					</svg>
				</button>
				<button id="ui-geo-segment-edit" class="geo-toolbar-btn" onclick="setTool('segment-edit')" title="Редактиране на сегменти">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
						<line x1="19" y1="5" x2="5" y2="19"/>
					</svg>
				</button>
				<button id="ui-geo-node-edit" class="geo-toolbar-btn" onclick="setTool('node-edit')" title="Редактиране на възли">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<circle cx="12" cy="12" r="3"/><path d="M12 2v7"/><path d="M12 15v7"/><path d="M2 12h7"/><path d="M15 12h7"/>
						<circle cx="12" cy="12" r="9" stroke-dasharray="2 2"/>
					</svg>
				</button>
				<div class="geo-toolbar-sep"></div>

				<button id="ui-geo-mirror" class="geo-toolbar-btn" onclick="GraphicsManager.applySymmetry()" title="Симетрия / Mirror">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<line x1="12" y1="3" x2="12" y2="21" stroke-dasharray="3 3"/>
						<path d="M9 6L3 12l6 6V6z"/>
						<path d="M15 6l6 6-6 6V6z"/>
					</svg>
				</button>
				<button id="ui-geo-line" class="geo-toolbar-btn" onclick="setTool('line')" title="Линия / Line">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<polyline points="4 18 10 6 14 18 20 6" />
					</svg>
				</button>
				<button id="ui-geo-rect" class="geo-toolbar-btn" onclick="setTool('rect')" title="Правоъгълник / Rectangle">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<rect x="3" y="5" width="18" height="14" rx="0" ry="0" />
					</svg>
				</button>
				<button id="ui-geo-round-rect" class="geo-toolbar-btn" onclick="setTool('round-rect')" title="Заоблен правоъгълник / Rounded Rectangle">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<rect x="3" y="5" width="18" height="14" rx="4" ry="4" />
					</svg>
				</button>

				<div class="geo-toolbar-sep"></div>

				<!-- Група: Връзки -->
				<button id="ui-rel-horizontal" class="geo-toolbar-btn" onclick="applyRelation('horizontal')" title="Хоризонтално">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
						<line x1="4" y1="12" x2="20" y2="12"/>
					</svg>
				</button>
				<button id="ui-rel-vertical" class="geo-toolbar-btn" onclick="applyRelation('vertical')" title="Вертикално">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
						<line x1="12" y1="4" x2="12" y2="20"/>
					</svg>
				</button>
				<button id="ui-rel-equal" class="geo-toolbar-btn" onclick="applyRelation('equal')" title="Равни дължини">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<line x1="5" y1="9" x2="19" y2="9"/><line x1="5" y1="15" x2="19" y2="15"/>
					</svg>
				</button>
				<button id="ui-rel-parallel" class="geo-toolbar-btn" onclick="applyRelation('parallel')" title="Успоредни">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<line x1="5" y1="6" x2="15" y2="10"/><line x1="9" y1="14" x2="19" y2="18"/>
					</svg>
				</button>
				<button id="ui-rel-collinear" class="geo-toolbar-btn" onclick="applyRelation('collinear')" title="Съосни">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<line x1="4" y1="12" x2="10" y2="12"/><line x1="14" y1="12" x2="20" y2="12"/><circle cx="12" cy="12" r="1" fill="currentColor"/>
					</svg>
				</button>

				<div class="geo-toolbar-sep"></div>

				<!-- Група: Подравняване -->
				<button id="ui-align-left" class="geo-toolbar-btn" onclick="GraphicsManager.align('left')" title="Подравняване отляво">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<line x1="4" y1="2" x2="4" y2="22"/><rect x="7" y="6" width="13" height="4"/><rect x="7" y="14" width="7" height="4"/>
					</svg>
				</button>
				<button id="ui-align-center" class="geo-toolbar-btn" onclick="GraphicsManager.align('center')" title="Центриране хоризонтално">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<line x1="12" y1="2" x2="12" y2="22"/><rect x="5" y="6" width="14" height="4"/><rect x="8" y="14" width="8" height="4"/>
					</svg>
				</button>
				<button id="ui-align-right" class="geo-toolbar-btn" onclick="GraphicsManager.align('right')" title="Подравняване отдясно">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<line x1="20" y1="2" x2="20" y2="22"/><rect x="4" y="6" width="13" height="4"/><rect x="10" y="14" width="7" height="4"/>
					</svg>
				</button>
				<button id="ui-align-top" class="geo-toolbar-btn" onclick="GraphicsManager.align('top')" title="Подравняване отгоре">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<line x1="2" y1="4" x2="22" y2="4"/><rect x="6" y="7" width="4" height="13"/><rect x="14" y="7" width="4" height="7"/>
					</svg>
				</button>
				<button id="ui-align-middle" class="geo-toolbar-btn" onclick="GraphicsManager.align('middle')" title="Центриране вертикално">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<line x1="2" y1="12" x2="22" y2="12"/><rect x="6" y="5" width="4" height="14"/><rect x="14" y="8" width="4" height="8"/>
					</svg>
				</button>
				<button id="ui-align-bottom" class="geo-toolbar-btn" onclick="GraphicsManager.align('bottom')" title="Подравняване отдолу">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<line x1="2" y1="20" x2="22" y2="20"/><rect x="6" y="4" width="4" height="13"/><rect x="14" y="10" width="4" height="7"/>
					</svg>
				</button>


				<!-- Група: История -->
				<button class="geo-toolbar-btn" onclick="GraphicsManager.undo()" title="Undo (Ctrl+Z)">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
					</svg>
				</button>

				<div class="geo-toolbar-sep"></div>

				<!-- Група: Експорт -->
				<button id="ui-geo-export" class="geo-toolbar-btn geo-toolbar-btn--success" onclick="exportSVG()" title="Запис (SVG)">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
					</svg>
				</button>
			</div>

			<!-- КАНВА (CANVAS) -->
			<div id="canvas-wrapper" style="position: relative; width: 100%; background: #fff; border: 1px solid #ccc; overflow: hidden; height: calc(85vh - 52px); border-radius: 0 0 8px 8px;">
				<canvas id="mainCanvas" style="position: absolute; top: 0; left: 0; z-index: 2;"></canvas>
				<canvas id="gridCanvas" style="position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none;"></canvas>
			</div>
		</section>

		<section id="sec-about" class="app-section" style="display: none;">
			<div style="background: white; padding: 40px; border-radius: 12px; border: 1px solid #ddd; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 900px; margin: 0 auto; line-height: 1.6;">
				
				<div style="text-align: center; margin-bottom: 30px;">
					<h2 id="ui-about-title" style="color: #2d3d4c; font-size: 28px; border-bottom: 2px solid #2d3d4c; display: inline-block; padding-bottom: 10px;"></h2>
				</div>

				<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 20px;">
					<div>
						<h3 id="ui-about-mission-title" style="color: #3e4f5f;"></h3>
						<p id="ui-about-mission"></p>
					</div>
					<div>
						<h3 id="ui-about-method-title" style="color: #3e4f5f;"></h3>
						<p id="ui-about-method"></p>
					</div>
				</div>

				<hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

				<div style="background: #f8f9fa; padding: 20px; border-radius: 8px;">
					<h3 id="ui-about-features-title" style="color: #3e4f5f; margin-top: 0;"></h3>
					<ul style="padding-left: 20px;">
						<li id="ui-about-feat-1"></li>
						<li id="ui-about-feat-2"></li>
						<li id="ui-about-feat-3"></li>
					</ul>
				</div>

				<div style="margin-top: 30px; text-align: right; font-style: italic; color: #777;">
					<p id="ui-about-version"></p>
				</div>

    <script>
        function navigateTo(sectionId) {
            document.querySelectorAll('.app-section').forEach(sec => {
                sec.style.display = 'none';
            });
            const target = document.getElementById('sec-' + sectionId);
            if (target) target.style.display = 'block';

            const header = document.querySelector('header');
            if (header) {
                if (sectionId === 'geometric') {
                    header.style.display = 'none';
                } else {
                    header.style.display = 'flex';
                }
            }
            
            if(sectionId === 'geometric' && typeof GraphicsManager !== 'undefined') {
                GraphicsManager.resize();
                // Автоматично отваряне на прозореца за качване, ако няма качено изображение
                if (!GraphicsManager.bgImage.src) {
                    setTimeout(() => {
                        const uploadInput = document.getElementById('imgUpload');
                        if (uploadInput) uploadInput.click();
                    }, 100);
                }
            }
        }
    </script>
